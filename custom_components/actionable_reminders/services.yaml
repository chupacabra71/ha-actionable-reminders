# Services for Actionable Reminders integration

mark_done:
  name: Mark Done
  description: Mark a reminder as completed for today. Resets all retry counters and marks the task as done.
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the reminder to mark as done. Can be found in the switch entity attributes.
      required: true
      example: "abc123def456"
      selector:
        text:
    source:
      name: Source
      description: Optional label recorded in the audit journal for how this was completed (e.g. mobile, voice, dashboard).
      required: false
      example: "mobile"
      selector:
        text:

dismiss:
  name: Dismiss
  description: Dismiss a reminder without marking it done. Equivalent to responding "No, not yet" to an actionable notification. Increments retry counter and waits for next retry interval.
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the reminder to dismiss.
      required: true
      example: "abc123def456"
      selector:
        text:

skip_today:
  name: Skip Today
  description: Skip a reminder for today. Marks it as done for today but doesn't count as completed. Will restart tomorrow at the scheduled time.
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the reminder to skip.
      required: true
      example: "abc123def456"
      selector:
        text:

force_prompt:
  name: Force Prompt
  description: Immediately trigger a reminder prompt, bypassing all schedule, presence, and quiet hour checks. Useful for testing.
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the reminder to prompt.
      required: true
      example: "abc123def456"
      selector:
        text:

set_accumulator_baseline:
  name: Set Accumulator Baseline
  description: Set an accumulator reminder's baseline directly. "Accumulated since done" = current source value minus this baseline. Use to correct the counter without a full completion (e.g. seeding a migrated reminder, or after a manual filter change).
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the accumulator reminder. Found in the switch entity's attributes.
      required: true
      example: "abc123def456"
      selector:
        text:
    baseline:
      name: Baseline
      description: The source value to treat as "zero accumulated". Set to 0 to count the source's full current value.
      required: true
      example: 0
      selector:
        number:
          mode: box
          step: any
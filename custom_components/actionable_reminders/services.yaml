# Services for Actionable Reminders integration

mark_done:
  name: Mark Done
  description: Mark a reminder as completed for today. Resets all retry counters and marks the task as done.
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the reminder to mark as done. Can be found in the switch entity attributes.
      required: true
      example: "abc123def456"
      selector:
        text:
    source:
      name: Source
      description: Optional label recorded in the audit journal for how this was completed (e.g. mobile, voice, dashboard).
      required: false
      example: "mobile"
      selector:
        text:

dismiss:
  name: Dismiss
  description: Dismiss a reminder without marking it done. Equivalent to responding "No, not yet" to an actionable notification. Increments retry counter and waits for next retry interval.
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the reminder to dismiss.
      required: true
      example: "abc123def456"
      selector:
        text:

skip_today:
  name: Skip Today
  description: Skip a reminder for today. Marks it as done for today but doesn't count as completed. Will restart tomorrow at the scheduled time.
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the reminder to skip.
      required: true
      example: "abc123def456"
      selector:
        text:

force_prompt:
  name: Force Prompt
  description: Immediately trigger a reminder prompt, bypassing all schedule, presence, and quiet hour checks. Useful for testing.
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the reminder to prompt.
      required: true
      example: "abc123def456"
      selector:
        text:

snooze:
  name: Snooze
  description: Defer a reminder — it won't prompt again until the duration has elapsed. Refused for mandatory reminders.
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the reminder to snooze.
      required: true
      example: "abc123def456"
      selector:
        text:
    duration:
      name: Duration
      description: How long to defer (e.g. 2 hours, or 0:30:00).
      required: true
      example: "02:00:00"
      selector:
        duration:
    source:
      name: Source
      description: Optional label recorded in the audit journal.
      required: false
      selector:
        text:

reschedule_next:
  name: Reschedule Next
  description: Move a scheduled reminder's next due date to a specific day (cleared once completed). Ignored for condition reminders; refused for mandatory reminders.
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the reminder to reschedule.
      required: true
      example: "abc123def456"
      selector:
        text:
    date:
      name: Date
      description: The new next-due date.
      required: true
      example: "2026-08-15"
      selector:
        date:
    source:
      name: Source
      description: Optional label recorded in the audit journal.
      required: false
      selector:
        text:

set_accumulator_baseline:
  name: Set Accumulator Baseline
  description: Set an accumulator reminder's baseline directly. "Accumulated since done" = current source value minus this baseline. Use to correct the counter without a full completion (e.g. seeding a migrated reminder, or after a manual filter change).
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the accumulator reminder. Found in the switch entity's attributes.
      required: true
      example: "abc123def456"
      selector:
        text:
    baseline:
      name: Baseline
      description: The source value to treat as "zero accumulated". Set to 0 to count the source's full current value.
      required: true
      example: 0
      selector:
        number:
          mode: box
          step: any

create_reminder:
  name: Create Reminder
  description: >-
    Create a new reminder programmatically or by voice. Returns the new
    reminder's entry_id in the service response.
  fields:
    name:
      name: Name
      description: Display name for the reminder.
      required: true
      example: Water the plants
      selector:
        text:
    schedule_type:
      name: Schedule type
      description: How the reminder recurs.
      required: false
      default: once
      selector:
        select:
          options:
            - label: One-time (on a date)
              value: once
            - label: Repeating (every N days/weeks/months)
              value: repeating
            - label: Yearly (anniversary / birthday)
              value: yearly
            - label: Condition (Jinja template due-when)
              value: condition
    time:
      name: Time of day
      description: When it should prompt. Defaults to 09:00.
      required: false
      example: "09:00"
      selector:
        time:
    date:
      name: Date
      description: Required for One-time and Yearly. For yearly, the month/day recurs (the year is used only for age).
      required: false
      example: "2026-09-02"
      selector:
        date:
    every:
      name: Every (N)
      description: For Repeating — the interval count (e.g. 2 with unit "weeks" = every 2 weeks).
      required: false
      example: 1
      selector:
        number:
          mode: box
          min: 1
          step: 1
    unit:
      name: Interval unit
      description: For Repeating.
      required: false
      default: weeks
      selector:
        select:
          options: [days, weeks, months, years]
    weekdays:
      name: Weekdays
      description: For Repeating with unit "weeks" — restrict to these days (optional).
      required: false
      selector:
        select:
          multiple: true
          options:
            - label: Monday
              value: mon
            - label: Tuesday
              value: tue
            - label: Wednesday
              value: wed
            - label: Thursday
              value: thu
            - label: Friday
              value: fri
            - label: Saturday
              value: sat
            - label: Sunday
              value: sun
    anchor:
      name: Anchor date
      description: For Repeating — the first occurrence the interval counts from. Defaults to today.
      required: false
      example: "2026-07-22"
      selector:
        date:
    due_template:
      name: Due template
      description: For Condition — a Jinja template; the reminder is due while it renders truthy.
      required: false
      example: "{{ is_state('binary_sensor.water_low','on') }}"
      selector:
        template:
    message:
      name: Prompt message
      description: Custom text spoken/shown when prompting. Optional.
      required: false
      example: Time to water the plants
      selector:
        text:
    mandatory:
      name: Mandatory
      description: If on, the reminder cannot be skipped, snoozed, or rescheduled and never auto-gives-up.
      required: false
      selector:
        boolean:
    lead_times:
      name: Lead times (days before)
      description: Pre-notification offsets in days before due (e.g. [7, 1]). Optional.
      required: false
      example: "[7, 1]"
      selector:
        object:
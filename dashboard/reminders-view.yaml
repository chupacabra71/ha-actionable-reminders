# ─────────────────────────────────────────────────────────────────────────────
# "Reminders" — a management view for the actionable_reminders integration.
#
# Completion is the primary action. The list is urgency-ranked (most urgent on
# top). Enabling/disabling a reminder is behind double-tap → more-info.
#
#   Tap = mark done    Hold = snooze 2h    Double-tap = details (enable/disable)
#
# Rows are built by auto-entities (include rule) as custom:button-card, styled
# per-status. Full-width band: max_columns is 2, so the column_span:2 section has
# a 24-col internal grid — every card sets grid_options.columns: full so they
# stack top-to-bottom instead of masonry-splitting.
# Custom cards (all via HACS): mushroom, button-card, auto-entities.
# ─────────────────────────────────────────────────────────────────────────────
title: Reminders
path: reminders
icon: mdi:bell-ring
type: sections
max_columns: 2

header:
  layout: start
  card:
    type: vertical-stack
    cards:
      - type: markdown
        text_only: true
        content: "## Reminders"
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: template
            entity: switch.actionable_reminders_master
            icon: >-
              {{ 'mdi:bell-ring' if is_state('switch.actionable_reminders_master','on') else 'mdi:bell-off' }}
            icon_color: >-
              {{ 'green' if is_state('switch.actionable_reminders_master','on') else 'disabled' }}
            content: >-
              {{ 'All on' if is_state('switch.actionable_reminders_master','on') else 'All off' }}
            tap_action:
              action: toggle
          - type: template
            icon: mdi:alert-decagram
            icon_color: "{{ 'red' if state_attr('sensor.reminders_next_up','count')|int(0) > 0 else 'grey' }}"
            content: "{{ state_attr('sensor.reminders_next_up','count')|int(0) }} need attention"
          - type: template
            icon: mdi:checkbox-marked-circle-outline
            icon_color: "{{ 'orange' if states('todo.actionable_reminders_reminders')|int(0) > 0 else 'grey' }}"
            content: "{{ states('todo.actionable_reminders_reminders')|int(0) }} due"
          - type: template
            icon: mdi:plus-circle
            icon_color: green
            content: Add
            tap_action:
              action: navigate
              navigation_path: /config/integrations/integration/actionable_reminders
          - type: template
            icon: mdi:cog
            icon_color: grey
            content: Manage
            tap_action:
              action: navigate
              navigation_path: /config/integrations/integration/actionable_reminders

sections:
  # ── Due next: urgency-ranked (most urgent on top) ───────────────────────────
  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading: Due next
        heading_style: subtitle
        icon: mdi:calendar-clock
        grid_options:
          columns: full
          rows: auto
      - type: markdown
        text_only: true
        content: "Tap = done · hold = snooze 2h · double-tap = details"
        grid_options:
          columns: full
          rows: auto
      - type: custom:auto-entities
        show_empty: true
        card:
          type: grid
          columns: 1
          square: false
        card_param: cards
        sort:
          method: attribute
          attribute: urgency
          reverse: true
          numeric: true
        grid_options:
          columns: full
          rows: auto
        filter:
          include:
            - domain: switch
              integration: actionable_reminders
              options:
                type: custom:button-card
                show_state: false
                show_label: true
                name: "[[[ return entity.attributes.friendly_name; ]]]"
                label: "[[[ return entity.attributes.summary || ''; ]]]"
                icon: >
                  [[[ var s=entity.attributes.status;
                    return s==='triggered' ? 'mdi:bell-alert' : s==='overdue' ? 'mdi:bell-ring' : s==='due_soon' ? 'mdi:bell' : s==='disabled' ? 'mdi:bell-off' : 'mdi:bell-check'; ]]]
                tap_action:
                  action: call-service
                  service: actionable_reminders.mark_done
                  service_data:
                    entry_id: "[[[ return entity.attributes.entry_id; ]]]"
                  confirmation:
                    text: Mark this reminder done?
                hold_action:
                  action: call-service
                  service: actionable_reminders.snooze
                  service_data:
                    entry_id: "[[[ return entity.attributes.entry_id; ]]]"
                    duration: "02:00:00"
                double_tap_action:
                  action: more-info
                styles:
                  card:
                    - padding: 8px 12px
                    - border-left: >
                        [[[ var s=entity.attributes.status;
                          var c = s==='triggered' ? 'var(--error-color)' : s==='overdue' ? 'var(--warning-color)' : s==='due_soon' ? '#f0b429' : s==='disabled' ? 'var(--disabled-text-color)' : 'var(--success-color)';
                          return '4px solid ' + c; ]]]
                  grid:
                    - grid-template-areas: '"i n" "i l"'
                    - grid-template-columns: 30px 1fr
                  icon:
                    - width: 20px
                    - color: >
                        [[[ var s=entity.attributes.status;
                          return s==='triggered' ? 'var(--error-color)' : s==='overdue' ? 'var(--warning-color)' : s==='due_soon' ? '#f0b429' : s==='disabled' ? 'var(--disabled-text-color)' : 'var(--success-color)'; ]]]
                  name:
                    - justify-self: start
                    - font-weight: "500"
                  label:
                    - justify-self: start
                    - font-size: 12px
                    - color: var(--secondary-text-color)
          exclude:
            - entity_id: switch.actionable_reminders_master

  # ── Due now (checklist / Assist) ────────────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: Due now
        heading_style: subtitle
        icon: mdi:checkbox-marked-circle-outline
      - type: todo-list
        entity: todo.actionable_reminders_reminders

# ─────────────────────────────────────────────────────────────────────────────
# "Reminders" — a management view for the actionable_reminders integration.
#
# Add as a new view on an existing dashboard (Edit dashboard → + Add view →
# ⋮ Edit in YAML → paste this).
#
# Design: completion is the primary action. The "Do next" card surfaces the
# single most-urgent reminder (sensor.reminders_next_up) with one-tap complete /
# snooze; the list below is urgency-ranked with the same gestures per row.
# Enabling/disabling a reminder is NOT a primary control — it lives behind
# double-tap → more-info.
#
#   Tap    = mark done      Hold = snooze 2h      Double-tap = details (enable/disable)
#
# Custom cards (all via HACS): mushroom (chips), button-card, auto-entities.
# ─────────────────────────────────────────────────────────────────────────────
title: Reminders
path: reminders
icon: mdi:bell-ring
type: sections
max_columns: 2

header:
  layout: start
  card:
    type: vertical-stack
    cards:
      - type: markdown
        text_only: true
        content: "## Reminders"
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: template
            entity: switch.actionable_reminders_master
            icon: >-
              {{ 'mdi:bell-ring' if is_state('switch.actionable_reminders_master','on') else 'mdi:bell-off' }}
            icon_color: >-
              {{ 'green' if is_state('switch.actionable_reminders_master','on') else 'disabled' }}
            content: >-
              {{ 'All on' if is_state('switch.actionable_reminders_master','on') else 'All off' }}
            tap_action:
              action: toggle
          - type: template
            icon: mdi:alert-decagram
            icon_color: "{{ 'red' if state_attr('sensor.reminders_next_up','count')|int(0) > 0 else 'grey' }}"
            content: "{{ state_attr('sensor.reminders_next_up','count')|int(0) }} need attention"
          - type: template
            icon: mdi:checkbox-marked-circle-outline
            icon_color: "{{ 'orange' if states('todo.actionable_reminders_reminders')|int(0) > 0 else 'grey' }}"
            content: "{{ states('todo.actionable_reminders_reminders')|int(0) }} due"
          - type: template
            icon: mdi:plus-circle
            icon_color: green
            content: Add
            tap_action:
              action: navigate
              navigation_path: /config/integrations/integration/actionable_reminders
          - type: template
            icon: mdi:cog
            icon_color: grey
            content: Manage
            tap_action:
              action: navigate
              navigation_path: /config/integrations/integration/actionable_reminders

sections:
  # ── Do next: the single most-urgent reminder ───────────────────────────────
  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading: Do next
        heading_style: subtitle
        icon: mdi:target
      - type: custom:button-card
        entity: sensor.reminders_next_up
        show_state: false
        show_label: true
        name: "[[[ return states['sensor.reminders_next_up'].attributes.count > 0 ? entity.state : 'All clear' ]]]"
        label: >-
          [[[ var a=entity.attributes;
              if (a.count > 0) { return a.summary + (a.count > 1 ? '   ·   +' + (a.count-1) + ' more' : ''); }
              return 'Nothing needs doing right now'; ]]]
        icon: >-
          [[[ var s=entity.attributes.status;
              return s==='triggered' ? 'mdi:bell-alert' : s==='overdue' ? 'mdi:bell-ring' : s==='due_soon' ? 'mdi:bell' : 'mdi:check-circle'; ]]]
        tap_action:
          action: call-service
          service: actionable_reminders.mark_done
          service_data:
            entry_id: "[[[ return states['sensor.reminders_next_up'].attributes.entry_id; ]]]"
          confirmation:
            text: Mark the most urgent reminder done?
        hold_action:
          action: call-service
          service: actionable_reminders.snooze
          service_data:
            entry_id: "[[[ return states['sensor.reminders_next_up'].attributes.entry_id; ]]]"
            duration: "02:00:00"
        double_tap_action:
          action: more-info
        styles:
          card:
            - padding: 14px 16px
            - border-radius: 14px
            - border-left: >-
                [[[ var s=entity.attributes.status;
                    var c = s==='triggered' ? 'var(--error-color)' : s==='overdue' ? 'var(--warning-color)' : s==='due_soon' ? '#f0b429' : 'var(--success-color)';
                    return '5px solid ' + (entity.attributes.count>0 ? c : 'var(--success-color)'); ]]]
          grid:
            - grid-template-areas: '"i n" "i l"'
            - grid-template-columns: 46px 1fr
          icon:
            - width: 32px
            - color: >-
                [[[ var s=entity.attributes.status;
                    return s==='triggered' ? 'var(--error-color)' : s==='overdue' ? 'var(--warning-color)' : s==='due_soon' ? '#f0b429' : 'var(--success-color)'; ]]]
          name:
            - justify-self: start
            - font-size: 17px
            - font-weight: '600'
          label:
            - justify-self: start
            - font-size: 13px
            - color: var(--secondary-text-color)
            - padding-top: 2px

  # ── All reminders, urgency-ranked ───────────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: All reminders
        heading_style: subtitle
        icon: mdi:format-list-bulleted
      - type: markdown
        text_only: true
        content: "Tap = done · hold = snooze 2h · double-tap = details"
      - type: custom:auto-entities
        show_empty: false
        card:
          type: grid
          columns: 1
          square: false
        card_param: cards
        sort:
          method: attribute
          attribute: urgency
          reverse: true
          numeric: true
        filter:
          include:
            - domain: switch
              integration: actionable_reminders
              options:
                type: custom:button-card
                show_state: false
                show_label: true
                name: "[[[ return entity.attributes.friendly_name; ]]]"
                label: "[[[ return entity.attributes.summary || ''; ]]]"
                icon: >-
                  [[[ var s=entity.attributes.status;
                      return s==='triggered' ? 'mdi:bell-alert' : s==='overdue' ? 'mdi:bell-ring' : s==='due_soon' ? 'mdi:bell' : s==='disabled' ? 'mdi:bell-off' : 'mdi:bell-check'; ]]]
                tap_action:
                  action: call-service
                  service: actionable_reminders.mark_done
                  service_data:
                    entry_id: "[[[ return entity.attributes.entry_id; ]]]"
                  confirmation:
                    text: Mark this reminder done?
                hold_action:
                  action: call-service
                  service: actionable_reminders.snooze
                  service_data:
                    entry_id: "[[[ return entity.attributes.entry_id; ]]]"
                    duration: "02:00:00"
                double_tap_action:
                  action: more-info
                styles:
                  card:
                    - padding: 8px 12px
                    - border-left: >-
                        [[[ var s=entity.attributes.status;
                            var c = s==='triggered' ? 'var(--error-color)' : s==='overdue' ? 'var(--warning-color)' : s==='due_soon' ? '#f0b429' : s==='disabled' ? 'var(--disabled-text-color)' : 'var(--success-color)';
                            return '4px solid ' + c; ]]]
                  grid:
                    - grid-template-areas: '"i n" "i l"'
                    - grid-template-columns: 30px 1fr
                  icon:
                    - width: 20px
                    - color: >-
                        [[[ var s=entity.attributes.status;
                            return s==='triggered' ? 'var(--error-color)' : s==='overdue' ? 'var(--warning-color)' : s==='due_soon' ? '#f0b429' : s==='disabled' ? 'var(--disabled-text-color)' : 'var(--success-color)'; ]]]
                  name:
                    - justify-self: start
                    - font-weight: '500'
                  label:
                    - justify-self: start
                    - font-size: 12px
                    - color: var(--secondary-text-color)
          exclude:
            - entity_id: switch.actionable_reminders_master

  # ── Due now (checklist / Assist) ────────────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: Due now
        heading_style: subtitle
        icon: mdi:checkbox-marked-circle-outline
      - type: todo-list
        entity: todo.actionable_reminders_reminders

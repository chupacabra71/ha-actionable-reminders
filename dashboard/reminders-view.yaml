# ─────────────────────────────────────────────────────────────────────────────
# "Reminders" — a management view for the actionable_reminders integration.
#
# Completion is the primary action. The list is urgency-ranked and filtered by a
# selectable horizon (input_select.reminders_horizon); "All upcoming" shows
# everything. Enabling/disabling a reminder is behind double-tap → more-info.
#
#   Tap = mark done    Hold = snooze 2h    Double-tap = details (enable/disable)
#
# The list is built by a Jinja template filter (auto-entities) so only in-horizon
# rows are rendered — no hidden-cell gaps. Requires helper
# input_select.reminders_horizon.
# Custom cards (all via HACS): mushroom, button-card, auto-entities.
# ─────────────────────────────────────────────────────────────────────────────
title: Reminders
path: reminders
icon: mdi:bell-ring
type: sections
max_columns: 2

header:
  layout: start
  card:
    type: vertical-stack
    cards:
      - type: markdown
        text_only: true
        content: "## Reminders"
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: template
            entity: switch.actionable_reminders_master
            icon: >-
              {{ 'mdi:bell-ring' if is_state('switch.actionable_reminders_master','on') else 'mdi:bell-off' }}
            icon_color: >-
              {{ 'green' if is_state('switch.actionable_reminders_master','on') else 'disabled' }}
            content: >-
              {{ 'All on' if is_state('switch.actionable_reminders_master','on') else 'All off' }}
            tap_action:
              action: toggle
          - type: template
            icon: mdi:alert-decagram
            icon_color: "{{ 'red' if state_attr('sensor.reminders_next_up','count')|int(0) > 0 else 'grey' }}"
            content: "{{ state_attr('sensor.reminders_next_up','count')|int(0) }} need attention"
          - type: template
            icon: mdi:checkbox-marked-circle-outline
            icon_color: "{{ 'orange' if states('todo.actionable_reminders_reminders')|int(0) > 0 else 'grey' }}"
            content: "{{ states('todo.actionable_reminders_reminders')|int(0) }} due"
          - type: template
            icon: mdi:plus-circle
            icon_color: green
            content: Add
            tap_action:
              action: navigate
              navigation_path: /config/integrations/integration/actionable_reminders
          - type: template
            icon: mdi:cog
            icon_color: grey
            content: Manage
            tap_action:
              action: navigate
              navigation_path: /config/integrations/integration/actionable_reminders

sections:
  # ── Due next: urgency-ranked, filtered to the selected horizon ──────────────
  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading: Due next
        heading_style: subtitle
        icon: mdi:calendar-clock
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            content: 2 days
            icon_color: "{{ 'blue' if is_state('input_select.reminders_horizon','Next 2 days') else 'disabled' }}"
            tap_action: &sel
              action: perform-action
              perform_action: input_select.select_option
              target:
                entity_id: input_select.reminders_horizon
              data:
                option: Next 2 days
          - type: template
            content: Week
            icon_color: "{{ 'blue' if is_state('input_select.reminders_horizon','Next week') else 'disabled' }}"
            tap_action:
              <<: *sel
              data:
                option: Next week
          - type: template
            content: 2 wks
            icon_color: "{{ 'blue' if is_state('input_select.reminders_horizon','Next 2 weeks') else 'disabled' }}"
            tap_action:
              <<: *sel
              data:
                option: Next 2 weeks
          - type: template
            content: Month
            icon_color: "{{ 'blue' if is_state('input_select.reminders_horizon','Next month') else 'disabled' }}"
            tap_action:
              <<: *sel
              data:
                option: Next month
          - type: template
            content: All
            icon_color: "{{ 'blue' if is_state('input_select.reminders_horizon','All upcoming') else 'disabled' }}"
            tap_action:
              <<: *sel
              data:
                option: All upcoming
      - type: markdown
        text_only: true
        content: "Tap = done · hold = snooze 2h · double-tap = details"
      - type: custom:auto-entities
        show_empty: true
        card:
          type: grid
          columns: 1
          square: false
        card_param: cards
        filter:
          template: |
            {% set m = {'Next 2 days':2,'Next week':7,'Next 2 weeks':14,'Next month':31,'All upcoming':99999} %}
            {% set lim = m.get(states('input_select.reminders_horizon'), 7) %}
            {% set ns = namespace(cards=[]) %}
            {% set sw = states.switch
                 | selectattr('attributes.days_until_due','defined')
                 | rejectattr('entity_id','eq','switch.actionable_reminders_master')
                 | sort(attribute='attributes.urgency', reverse=true) | list %}
            {% for s in sw %}
              {% if s.attributes.days_until_due | int(99999) <= lim %}
                {% set st = s.attributes.status %}
                {% set col = 'var(--error-color)' if st=='triggered' else 'var(--warning-color)' if st=='overdue' else '#f0b429' if st=='due_soon' else 'var(--disabled-text-color)' if st=='disabled' else 'var(--success-color)' %}
                {% set ico = 'mdi:bell-alert' if st=='triggered' else 'mdi:bell-ring' if st=='overdue' else 'mdi:bell' if st=='due_soon' else 'mdi:bell-off' if st=='disabled' else 'mdi:bell-check' %}
                {% set row = {
                  'type':'custom:button-card',
                  'entity': s.entity_id,
                  'show_state': false,
                  'show_label': true,
                  'name': s.attributes.friendly_name,
                  'label': s.attributes.summary | default(''),
                  'icon': ico,
                  'tap_action': {'action':'call-service','service':'actionable_reminders.mark_done','service_data':{'entry_id': s.attributes.entry_id},'confirmation':{'text':'Mark ' ~ s.attributes.friendly_name ~ ' done?'}},
                  'hold_action': {'action':'call-service','service':'actionable_reminders.snooze','service_data':{'entry_id': s.attributes.entry_id,'duration':'02:00:00'}},
                  'double_tap_action': {'action':'more-info'},
                  'styles': {
                    'card':[{'padding':'8px 12px'},{'border-left': '4px solid ' ~ col}],
                    'grid':[{'grid-template-areas':'"i n" "i l"'},{'grid-template-columns':'30px 1fr'}],
                    'icon':[{'width':'20px'},{'color': col}],
                    'name':[{'justify-self':'start'},{'font-weight':'500'}],
                    'label':[{'justify-self':'start'},{'font-size':'12px'},{'color':'var(--secondary-text-color)'}]
                  }
                } %}
                {% set ns.cards = ns.cards + [row] %}
              {% endif %}
            {% endfor %}
            {{ ns.cards | to_json }}

  # ── Due now (checklist / Assist) ────────────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: Due now
        heading_style: subtitle
        icon: mdi:checkbox-marked-circle-outline
      - type: todo-list
        entity: todo.actionable_reminders_reminders

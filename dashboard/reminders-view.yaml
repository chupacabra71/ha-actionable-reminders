# ─────────────────────────────────────────────────────────────────────────────
# "Reminders" — a management view for the actionable_reminders integration.
#
# Completion is the primary action. The list is urgency-ranked and filtered by a
# selectable horizon (input_select.reminders_horizon); "All upcoming" shows
# everything. Enabling/disabling a reminder is NOT a primary control — it's
# behind double-tap → more-info.
#
#   Tap = mark done    Hold = snooze 2h    Double-tap = details (enable/disable)
#
# Requires helper: input_select.reminders_horizon
#   (options: Next 2 days / Next week / Next 2 weeks / Next month / All upcoming)
# Custom cards (all via HACS): mushroom, button-card, auto-entities, card-mod.
# ─────────────────────────────────────────────────────────────────────────────
title: Reminders
path: reminders
icon: mdi:bell-ring
type: sections
max_columns: 2

header:
  layout: start
  card:
    type: vertical-stack
    cards:
      - type: markdown
        text_only: true
        content: "## Reminders"
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: template
            entity: switch.actionable_reminders_master
            icon: >-
              {{ 'mdi:bell-ring' if is_state('switch.actionable_reminders_master','on') else 'mdi:bell-off' }}
            icon_color: >-
              {{ 'green' if is_state('switch.actionable_reminders_master','on') else 'disabled' }}
            content: >-
              {{ 'All on' if is_state('switch.actionable_reminders_master','on') else 'All off' }}
            tap_action:
              action: toggle
          - type: template
            icon: mdi:alert-decagram
            icon_color: "{{ 'red' if state_attr('sensor.reminders_next_up','count')|int(0) > 0 else 'grey' }}"
            content: "{{ state_attr('sensor.reminders_next_up','count')|int(0) }} need attention"
          - type: template
            icon: mdi:checkbox-marked-circle-outline
            icon_color: "{{ 'orange' if states('todo.actionable_reminders_reminders')|int(0) > 0 else 'grey' }}"
            content: "{{ states('todo.actionable_reminders_reminders')|int(0) }} due"
          - type: template
            icon: mdi:plus-circle
            icon_color: green
            content: Add
            tap_action:
              action: navigate
              navigation_path: /config/integrations/integration/actionable_reminders
          - type: template
            icon: mdi:cog
            icon_color: grey
            content: Manage
            tap_action:
              action: navigate
              navigation_path: /config/integrations/integration/actionable_reminders

sections:
  # ── Due next: urgency-ranked, filtered by the selected horizon ──────────────
  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading: Due next
        heading_style: subtitle
        icon: mdi:calendar-clock
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            content: 2 days
            icon_color: "{{ 'blue' if is_state('input_select.reminders_horizon','Next 2 days') else 'disabled' }}"
            tap_action: &sel
              action: perform-action
              perform_action: input_select.select_option
              target:
                entity_id: input_select.reminders_horizon
              data:
                option: Next 2 days
          - type: template
            content: Week
            icon_color: "{{ 'blue' if is_state('input_select.reminders_horizon','Next week') else 'disabled' }}"
            tap_action:
              <<: *sel
              data:
                option: Next week
          - type: template
            content: 2 wks
            icon_color: "{{ 'blue' if is_state('input_select.reminders_horizon','Next 2 weeks') else 'disabled' }}"
            tap_action:
              <<: *sel
              data:
                option: Next 2 weeks
          - type: template
            content: Month
            icon_color: "{{ 'blue' if is_state('input_select.reminders_horizon','Next month') else 'disabled' }}"
            tap_action:
              <<: *sel
              data:
                option: Next month
          - type: template
            content: All
            icon_color: "{{ 'blue' if is_state('input_select.reminders_horizon','All upcoming') else 'disabled' }}"
            tap_action:
              <<: *sel
              data:
                option: All upcoming
      - type: markdown
        text_only: true
        content: "Tap = done · hold = snooze 2h · double-tap = details"
      - type: custom:auto-entities
        show_empty: true
        card:
          type: grid
          columns: 1
          square: false
        card_param: cards
        sort:
          method: attribute
          attribute: urgency
          reverse: true
          numeric: true
        filter:
          include:
            - domain: switch
              integration: actionable_reminders
              options:
                type: custom:button-card
                show_state: false
                show_label: true
                name: "[[[ return entity.attributes.friendly_name; ]]]"
                label: "[[[ return entity.attributes.summary || ''; ]]]"
                icon: >-
                  [[[ var s=entity.attributes.status;
                      return s==='triggered' ? 'mdi:bell-alert' : s==='overdue' ? 'mdi:bell-ring' : s==='due_soon' ? 'mdi:bell' : s==='disabled' ? 'mdi:bell-off' : 'mdi:bell-check'; ]]]
                tap_action:
                  action: call-service
                  service: actionable_reminders.mark_done
                  service_data:
                    entry_id: "[[[ return entity.attributes.entry_id; ]]]"
                  confirmation:
                    text: Mark this reminder done?
                hold_action:
                  action: call-service
                  service: actionable_reminders.snooze
                  service_data:
                    entry_id: "[[[ return entity.attributes.entry_id; ]]]"
                    duration: "02:00:00"
                double_tap_action:
                  action: more-info
                styles:
                  card:
                    - padding: 8px 12px
                    - border-left: >-
                        [[[ var s=entity.attributes.status;
                            var c = s==='triggered' ? 'var(--error-color)' : s==='overdue' ? 'var(--warning-color)' : s==='due_soon' ? '#f0b429' : s==='disabled' ? 'var(--disabled-text-color)' : 'var(--success-color)';
                            return '4px solid ' + c; ]]]
                  grid:
                    - grid-template-areas: '"i n" "i l"'
                    - grid-template-columns: 30px 1fr
                  icon:
                    - width: 20px
                    - color: >-
                        [[[ var s=entity.attributes.status;
                            return s==='triggered' ? 'var(--error-color)' : s==='overdue' ? 'var(--warning-color)' : s==='due_soon' ? '#f0b429' : s==='disabled' ? 'var(--disabled-text-color)' : 'var(--success-color)'; ]]]
                  name:
                    - justify-self: start
                    - font-weight: '500'
                  label:
                    - justify-self: start
                    - font-size: 12px
                    - color: var(--secondary-text-color)
                card_mod:
                  style: |
                    :host {
                      display:
                      {%- set m = {'Next 2 days':2,'Next week':7,'Next 2 weeks':14,'Next month':31,'All upcoming':99999} -%}
                      {%- set lim = m.get(states('input_select.reminders_horizon'), 7) -%}
                      {%- set du = state_attr(config.entity,'days_until_due')|int(99999) -%}
                      {{ 'none' if du > lim else 'block' }} !important;
                    }
          exclude:
            - entity_id: switch.actionable_reminders_master

  # ── Due now (checklist / Assist) ────────────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: Due now
        heading_style: subtitle
        icon: mdi:checkbox-marked-circle-outline
      - type: todo-list
        entity: todo.actionable_reminders_reminders

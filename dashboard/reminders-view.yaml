# ─────────────────────────────────────────────────────────────────────────────
# "Reminders" — a management view for the actionable_reminders integration.
#
# Add as a new view on an existing dashboard (Edit dashboard → + Add view →
# ⋮ Edit in YAML → paste this).
#
# Built-in cards throughout except the status list, where auto-entities +
# template-entity-row are used because there is no native way to render a
# templated per-reminder secondary line.
#   Requires: lovelace-auto-entities, lovelace-template-entity-row
#
# Entity IDs are stable across the subentry migration, so this works both
# before and after it. `next_due_date` is exposed from v0.9.0+.
# ─────────────────────────────────────────────────────────────────────────────
title: Reminders
path: reminders
icon: mdi:bell-ring
type: sections
max_columns: 3
sections:
  # ── Control ────────────────────────────────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: Control
        heading_style: title
        icon: mdi:tune

      - type: tile
        entity: switch.actionable_reminders_master
        name: All reminders
        icon: mdi:bell-ring
        features:
          - type: toggle
        tap_action:
          action: more-info

      - type: button
        name: Add reminder
        icon: mdi:plus-circle-outline
        tap_action:
          action: navigate
          navigation_path: /config/integrations/integration/actionable_reminders

  # ── What's due (check off to complete) ─────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: Due now
        heading_style: title
        icon: mdi:checkbox-marked-circle-outline

      # The to-do list already encodes the due logic: enabled + nagging
      # reminders only, and condition reminders only while actually due.
      # Checking an item off calls mark_done (runs its on_complete action).
      - type: todo-list
        entity: todo.actionable_reminders_reminders

  # ── Everything, with status ────────────────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: All reminders
        heading_style: title
        icon: mdi:format-list-bulleted

      - type: custom:auto-entities
        show_empty: false
        card:
          type: entities
          state_color: true
        sort:
          method: attribute
          attribute: next_due_date
        filter:
          include:
            - domain: switch
              integration: actionable_reminders
              options:
                type: custom:template-entity-row
                toggle: true
                tap_action:
                  action: more-info
                icon: >-
                  {% if state_attr(config.entity,'escalated') %}mdi:bell-alert{% elif
                  is_state(config.entity,'off') %}mdi:bell-off{% else %}mdi:bell{% endif %}
                secondary: >-
                  {% if is_state(config.entity,'off') %}Disabled{% elif
                  state_attr(config.entity,'escalated') %}Escalating{% elif
                  state_attr(config.entity,'auto_skipped') %}Skipped today{% elif
                  state_attr(config.entity,'next_due_date') %}Due {{
                  state_attr(config.entity,'next_due_date') }}{% elif
                  state_attr(config.entity,'last_done_date') %}Last done {{
                  state_attr(config.entity,'last_done_date') }}{% else %}Never done{% endif %}
          exclude:
            # The master switch lives in the Control section above.
            - entity_id: switch.actionable_reminders_master

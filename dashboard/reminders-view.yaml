# ─────────────────────────────────────────────────────────────────────────────
# "Reminders" — a management view for the actionable_reminders integration.
#
# Add as a new view on an existing dashboard (Edit dashboard → + Add view →
# ⋮ Edit in YAML → paste this).
#
# Requires (all already installed): lovelace-mushroom, lovelace-auto-entities,
# lovelace-template-entity-row.
#
# Entity IDs are stable across the subentry migration, so this view works both
# before and after it. `next_due_date` is exposed from v0.8.1+; on older builds
# the secondary line simply falls back to the last-done date.
# ─────────────────────────────────────────────────────────────────────────────
title: Reminders
path: reminders
icon: mdi:bell-ring
type: sections
max_columns: 3
sections:
  # ── Control ────────────────────────────────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: Control
        heading_style: title
        icon: mdi:tune

      - type: custom:mushroom-entity-card
        entity: switch.actionable_reminders_master
        name: All reminders
        icon: mdi:bell-ring
        icon_color: |-
          {{ 'amber' if is_state('switch.actionable_reminders_master','on') else 'grey' }}
        secondary_info: state
        tap_action:
          action: toggle
        hold_action:
          action: more-info

      - type: custom:mushroom-template-card
        primary: Add a reminder
        secondary: Opens the reminders hub
        icon: mdi:plus-circle-outline
        icon_color: blue
        tap_action:
          action: navigate
          navigation_path: /config/integrations/integration/actionable_reminders

  # ── What's due (check off to complete) ─────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: Due now
        heading_style: title
        icon: mdi:checkbox-marked-circle-outline

      # The to-do list already encodes the due logic: enabled + nagging
      # reminders only, and condition reminders only while actually due.
      # Checking an item off calls mark_done (runs its on_complete action).
      - type: todo-list
        entity: todo.actionable_reminders_reminders

  # ── Everything, with status ────────────────────────────────────────────────
  - type: grid
    cards:
      - type: heading
        heading: All reminders
        heading_style: title
        icon: mdi:format-list-bulleted

      - type: custom:auto-entities
        show_empty: false
        card:
          type: entities
          state_color: true
        sort:
          method: attribute
          attribute: next_due_date
          ignore_case: true
        filter:
          include:
            - domain: switch
              integration: actionable_reminders
              options:
                type: custom:template-entity-row
                name: >-
                  {{ state_attr(config.entity, 'friendly_name') }}
                icon: >-
                  {% if state_attr(config.entity, 'escalated') %}mdi:bell-alert
                  {%- elif is_state(config.entity, 'off') %}mdi:bell-off
                  {%- else %}mdi:bell{% endif %}
                secondary: >-
                  {%- set nd = state_attr(config.entity, 'next_due_date') -%}
                  {%- set ld = state_attr(config.entity, 'last_done_date') -%}
                  {%- set esc = state_attr(config.entity, 'escalated') -%}
                  {%- set skipped = state_attr(config.entity, 'auto_skipped') -%}
                  {%- if is_state(config.entity, 'off') -%}
                    Disabled
                  {%- elif esc -%}
                    Escalating — {{ state_attr(config.entity, 'retries_today') or 0 }} tries today
                  {%- elif skipped -%}
                    Skipped for today
                  {%- elif nd -%}
                    Due {{ nd }}{% if ld %} · last done {{ ld }}{% endif %}
                  {%- elif ld -%}
                    Last done {{ ld }}
                  {%- else -%}
                    Never done
                  {%- endif -%}
                toggle: true
                tap_action:
                  action: more-info
          exclude:
            # The master switch lives in the Control section above.
            - entity_id: switch.actionable_reminders_master
